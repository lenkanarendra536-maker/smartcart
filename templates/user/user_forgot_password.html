<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eef2f7, #dbeafe);
            font-family: 'Segoe UI', sans-serif;
        }

        /* Navbar */
        .navbar {
            background: rgba(15, 23, 42, 0.94);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 24px rgba(2, 6, 23, 0.22);
            padding: 14px 0;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            font-size: 1.1rem;
            color: #fff !important;
        }

        .brand-logo {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, #2563eb, #1e40af);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.15rem;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.35);
        }

        .navbar-nav .nav-link {
            color: rgba(255, 255, 255, 0.86) !important;
            font-weight: 500;
            margin-left: 10px;
            padding: 10px 14px !important;
            border-radius: 10px;
            transition: 0.3s;
        }

        .navbar-nav .nav-link:hover,
        .navbar-nav .nav-link.active {
            color: #fff !important;
            background: rgba(255, 255, 255, 0.10);
        }

        .login-link:hover {
            background: rgba(37, 99, 235, 0.18) !important;
            color: #dbeafe !important;
        }

        /* Flash animation */
        .alert {
            transition: opacity 0.5s ease-out;
        }

        /* Responsive */
        @media (max-width: 991px) {
            .navbar-nav .nav-link {
                margin-left: 0;
                margin-top: 6px;
            }
        }

        .card {
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        }

        .center-box {
            min-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/user-login">
                <span class="brand-logo"><i class="bi bi-cart3"></i></span>
                <span style="font-family: sans-serif;">Smart Cart</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse mt-3 mt-lg-0" id="mainNavbar">
                <ul class="navbar-nav ms-auto text-center text-lg-start">
                    <li class="nav-item">
                        <a class="nav-link" href="/user-login">
                            <i class="bi bi-house-door me-1"></i> Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/user-about">
                            <i class="bi bi-info-circle me-1"></i> About
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/user-contact">
                            <i class="bi bi-envelope me-1"></i> Contact
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link login-link" href="/user-login">
                            <i class="bi bi-box-arrow-in-right me-1"></i> Login
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main -->
    <div class="container center-box">
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card p-4">

                <h3 class="text-center mb-3">Forgot Password</h3>

                <!-- ✅ Fixed Flash Messages -->
                {% for category, message in get_flashed_messages(with_categories=true) %}
                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endfor %}

                <form method="POST">
                    <input type="email" name="email" class="form-control mb-3" placeholder="Enter Email" required>
                    <button class="btn btn-primary w-100">Send OTP</button>
                </form>

            </div>
        </div>
    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- ✅ Auto Close Script -->
    <script>
        setTimeout(function () {
            let alerts = document.querySelectorAll('.alert');
            alerts.forEach(function(alert) {
                let bsAlert = new bootstrap.Alert(alert);
                bsAlert.close();
            });
        }, 3000);
    </script>

</body>
</html>
