{% extends "user/base_user.html" %}

{% block title %}Products{% endblock %}

{% block css %}
<style>
    .products-page {
        padding: 30px 0 60px;
    }

    .page-title {
        font-weight: 800;
        color: #0f172a;
        margin-bottom: 24px;
    }

    .filter-box {
        background: #fff;
        border-radius: 18px;
        padding: 18px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.10);
        height: 100%;
    }

    .filter-form {
        display: flex;
        gap: 10px;
        align-items: center;
    }

    .filter-form .form-control,
    .filter-form .form-select {
        min-height: 50px;
        border-radius: 14px;
        font-size: 0.95rem;
    }

    .filter-btn {
        min-height: 50px;
        border-radius: 14px;
        padding: 0 18px;
        font-weight: 700;
        white-space: nowrap;
    }

    .product-col {
        display: flex;
    }

    .product-card {
        width: 100%;
        min-height: 390px;
        display: flex;
        flex-direction: column;
        border: none;
        border-radius: 20px;
        background: #fff;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.10);
        transition: 0.3s;
        padding: 18px;
        text-align: center;
    }

    .product-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 18px 38px rgba(15, 23, 42, 0.14);
    }

    .product-img-wrap {
        height: 155px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 14px;
    }

    .product-img {
        max-height: 150px;
        max-width: 100%;
        object-fit: contain;
    }

    .product-name {
        min-height: 44px;
        font-size: 1rem;
        font-weight: 800;
        color: #0f172a;
        margin-bottom: 8px;
        display: -webkit-box;

        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    .product-category {
        min-height: 24px;
        color: #64748b;
        margin-bottom: 8px;
    }

    .product-price {
        font-weight: 800;
        color: #0f172a;
        margin-bottom: 16px;
    }

    .product-actions {
        margin-top: auto;
        display: flex;
        gap: 10px;
        justify-content: center;
    }

    .product-actions form {
        flex: 1;
    }

    .product-actions .btn {
        width: 100%;
        border-radius: 12px;
        font-weight: 700;
        min-height: 44px;
    }

    @media (max-width: 767px) {
        .products-page {
            padding: 22px 0 45px;
        }

        .filter-form {
            flex-direction: column;
        }

        .filter-form .form-control,
        .filter-form .form-select,
        .filter-btn {
            width: 100%;
        }

        .product-card {
            min-height: 365px;
            padding: 15px;
        }

        .product-img-wrap {
            height: 130px;
        }

        .product-img {
            max-height: 125px;
        }

        .product-actions {
            flex-direction: column;
        }
    }

    @media (max-width: 420px) {
        .product-card {
            min-height: 350px;
            padding: 13px;
        }

        .product-name {
            font-size: 0.92rem;
            min-height: 40px;
        }

        .product-category,
        .product-price {
            font-size: 0.9rem;
        }

        .product-actions .btn {
            min-height: 40px;
            font-size: 0.88rem;
        }
    }
</style>
{% endblock %}

{% block content %}

<div class="container products-page">

    <h3 class="page-title">All Products</h3>

    <div class="row g-3 mb-4">

        <div class="col-12 col-md-6">
            <div class="filter-box">
                <form method="GET" action="/user/products" class="filter-form">
                    <input type="text" name="search" class="form-control" placeholder="Search product..."
                        value="{{ request.args.get('search','') }}">

                    <button class="btn btn-primary filter-btn">
                        <i class="bi bi-search me-1"></i> Search
                    </button>
                </form>
            </div>
        </div>

        <div class="col-12 col-md-6">
            <div class="filter-box">
                <form method="GET" action="/user/products" class="filter-form">
                    <select name="category" class="form-select">
                        <option value="">All Categories</option>

                        {% for cat in categories %}
                        <option value="{{ cat.category }}" {% if request.args.get('category')==cat.category %}selected{%
                            endif %}>
                            {{ cat.category }}
                        </option>
                        {% endfor %}
                    </select>

                    <button class="btn btn-dark filter-btn">
                        <i class="bi bi-funnel me-1"></i> Filter
                    </button>
                </form>
            </div>
        </div>

    </div>

    <div class="row g-4">

        {% for product in products %}
        <div class="col-6 col-md-4 col-lg-3 product-col">
            <div class="product-card">

                <div class="product-img-wrap">
                    <img src="{{ url_for('static', filename='uploads/product_images/' ~ product.image) }}"
                        class="product-img" alt="{{ product.name }}">
                </div>

                <h6 class="product-name">{{ product.name }}</h6>
                <p class="product-category">{{ product.category }}</p>
                <p class="product-price">₹{{ product.price }}</p>

                <div class="product-actions">

                    <form action="/user/product/{{ product.product_id }}" method="GET">
                        <button class="btn btn-primary">View</button>
                    </form>

                    <form action="/user/add-to-cart/{{ product.product_id }}" method="POST">
                        <button class="btn btn-success">
                            <i class="bi bi-cart3"></i> Add
                        </button>
                    </form>

                    <form action="/user/buy-now/{{ product.product_id }}" method="POST">
                        <button class="btn btn-dark">
                            <i class="bi bi-lightning-charge"></i> Buy
                        </button>
                    </form>

                </div>

            </div>
        </div>
        {% endfor %}

    </div>

</div>

{% endblock %}
