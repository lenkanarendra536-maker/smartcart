{% extends "user/base_user.html" %}

{% block title %}Edit Address{% endblock %}

{% block css %}
<style>
    .card-box {
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
</style>
{% endblock %}

{% block content %}

<div class="container mt-4">
    <div class="card card-box p-4">

        <h3 class="text-center mb-4">Edit Address</h3>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="full_name" class="form-control"
                       value="{{ address.full_name }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Phone</label>
                <input type="text" name="phone" class="form-control"
                       value="{{ address.phone }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Address</label>
                <input type="text" name="address" class="form-control"
                       value="{{ address.address }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Landmark</label>
                <input type="text" name="landmark" class="form-control"
                       value="{{ address.landmark }}">
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">City</label>
                    <input type="text" name="city" class="form-control"
                           value="{{ address.city }}" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">District</label>
                    <input type="text" name="district" class="form-control"
                           value="{{ address.district }}" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">State</label>
                    <input type="text" name="state" class="form-control"
                           value="{{ address.state }}" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Pincode</label>
                <input type="text" name="pincode" class="form-control"
                       value="{{ address.pincode }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Country</label>
                <input type="text" name="country" class="form-control"
                       value="{{ address.country }}" required>
            </div>

            <button type="submit" class="btn btn-success w-100">
                Update Address
            </button>

            <div class="text-center mt-3">
                <a href="/user/shipping-address" class="btn btn-outline-secondary">
                    Cancel
                </a>
            </div>

        </form>

    </div>
</div>

{% endblock %}
