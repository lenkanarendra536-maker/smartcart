<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #eef2f7, #dbeafe);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
        }

        /* ===== NEW NAVBAR CSS ===== */

        .navbar {
            background: rgba(15, 23, 42, 0.94);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 24px rgba(2, 6, 23, 0.22);
            padding: 14px 0;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            font-size: 1.1rem;
            color: #fff !important;
        }

        .brand-logo {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, #2563eb, #1e40af);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.35);
        }

        .navbar-nav .nav-link {
            color: rgba(255, 255, 255, 0.86) !important;
            font-weight: 500;
            margin-left: 10px;
            padding: 10px 14px !important;
            border-radius: 10px;
            transition: 0.3s;
        }

        .navbar-nav .nav-link:hover,
        .navbar-nav .nav-link.active {
            color: #fff !important;
            background: rgba(255, 255, 255, 0.10);
        }

        .logout-link:hover {
            background: rgba(220, 38, 38, 0.18) !important;
            color: #fecaca !important;
        }



        .cart-nav-link {
            display: inline-flex !important;
            align-items: center;
            justify-content: center;
            padding: 8px 12px !important;
        }

        .cart-icon-box {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
        }

        .cart-icon-box i {
            font-size: 24px;
            line-height: 1;
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -10px;
            background: red;
            color: white;
            font-size: 10px;
            min-width: 18px;
            height: 18px;
            padding: 0 5px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            line-height: 1;
        }

        @media(max-width:991px) {
            .navbar-nav .nav-link {
                margin-left: 0;
                margin-top: 6px;
            }
        }

        @media(max-width:768px) {
            .cart-badge {
                top: -8px;
                right: -10px;
            }
        }

        @media(max-width:575px) {
            .navbar-brand {
                font-size: 1rem;
            }

            .brand-logo {
                width: 38px;
                height: 38px;
                font-size: 1rem;
            }
        }

        /* ===== ORIGINAL CSS ===== */

        .payment-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .amount {
            font-size: 28px;
            font-weight: bold;
            color: #2563eb;
        }

        .pay-btn {
            padding: 12px;
            font-size: 18px;
            border-radius: 10px;
        }

        .center-box {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        footer {
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

<!-- ===== NEW NAVBAR ===== -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">

        <a class="navbar-brand" href="/user-dashboard">
            <span class="brand-logo"><i class="bi bi-cart3"></i></span>
            <span>Smart Cart</span>
        </a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse mt-3 mt-lg-0" id="nav">


            <ul class="navbar-nav ms-auto text-center text-lg-start align-items-lg-center">
                <li class="nav-item">
                    <a class="nav-link" href="/user-dashboard"><i class="bi bi-house-door"></i> Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/user/products"><i class="bi bi-bag"></i> Shop</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/user/my-orders"><i class="bi bi-box-seam"></i> Orders</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/user/profile">
                        <i class="bi bi-person-circle"></i> Hi, {{ session.get('user_name','Profile') }}
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link cart-nav-link" href="/user/cart">
                        <span class="cart-icon-box">
                            <i class="bi bi-cart3"></i>
                            <span class="cart-badge">{{ cart_count if cart_count else 0 }}</span>
                        </span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link logout-link" href="/user-logout">
                        <i class="bi bi-box-arrow-right"></i> Logout
                    </a>
                </li>
            </ul>

        </div>
    </div>
</nav>

<!-- MAIN -->
<div class="main-content">
    <div class="container center-box">

        <div class="col-12 col-md-6 col-lg-4">
            <div class="payment-card">

                <h4 class="mb-3">Complete Your Payment</h4>

                <p>Total Amount</p>
                <div class="amount">₹{{ amount }}</div>

                <button id="rzp-button" class="btn btn-success w-100 pay-btn mt-3">
                    <i class="bi bi-credit-card"></i> Pay Now
                </button>

            </div>
        </div>

    </div>
</div>

<!-- Footer -->
<footer>
    © 2026 SmartCart • Payment Page
</footer>

<!-- Razorpay -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
    var options = {
        "key": "{{ key_id }}",
        "amount": "{{ amount * 100 }}",
        "currency": "INR",
        "name": "SmartCart",
        "description": "Order Payment",
        "order_id": "{{ order_id }}",
        "handler": function (response) {
            var form = document.createElement("form");
            form.method = "POST";
            form.action = "/verify-payment";

            var fields = {
                razorpay_payment_id: response.razorpay_payment_id,
                razorpay_order_id: response.razorpay_order_id,
                razorpay_signature: response.razorpay_signature
            };

            for (var name in fields) {
                var input = document.createElement("input");
                input.type = "hidden";
                input.name = name;
                input.value = fields[name];
                form.appendChild(input);
            }

            document.body.appendChild(form);
            form.submit();
        }
    };

    var rzp = new Razorpay(options);
    document.getElementById('rzp-button').onclick = function (e) {
        rzp.open();
        e.preventDefault();
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
