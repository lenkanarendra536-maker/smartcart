{% extends "user/base_user.html" %}

{% block title %}Shipping Address{% endblock %}

{% block css %}
<style>
    .card-box {
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    .address-card {
        border: 1px solid #dee2e6;
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 10px;
        background: #fff;
        transition: 0.3s;
    }

    .address-card:hover {
        border-color: #0d6efd;
        background: #f8fbff;
    }
</style>
{% endblock %}

{% block content %}

<div class="main-content">
    <div class="container mt-4">

        <div class="card card-box p-4">

            <h3 class="mb-4 text-center">Select Shipping Address</h3>

            {% if addresses %}
            <h5 class="mb-3">Saved Addresses</h5>

            <form method="POST" action="{{ url_for('shipping_address') }}">

                {% for address in addresses %}
                <div class="address-card">
                    <div class="form-check">
                        <input class="form-check-input"
                               type="radio"
                               name="selected_address_id"
                               value="{{ address.address_id }}"
                               id="addr{{ address.address_id }}">

                        <label class="form-check-label w-100" for="addr{{ address.address_id }}">
                            <strong>{{ address.full_name }}</strong> | {{ address.phone }} <br>
                            {{ address.address }},
                            {{ address.landmark }},
                            {{ address.city }},
                            {{ address.district }},
                            {{ address.state }} - {{ address.pincode }},
                            {{ address.country }}
                        </label>
                    </div>

                    <div class="mt-2 d-flex gap-2">
                        <a href="/user/edit-address/{{ address.address_id }}" class="btn btn-sm btn-warning">
                            Edit
                        </a>

                        <a href="/user/delete-address/{{ address.address_id }}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('Are you sure you want to delete this address?')">
                            Delete
                        </a>
                    </div>
                </div>
                {% endfor %}

                <button type="submit" class="btn btn-primary mb-4 w-100">
                    Use Selected Address
                </button>
            </form>

            <hr>
            {% endif %}

            <h5 class="mb-3">Add New Address</h5>

            <form method="POST" action="{{ url_for('shipping_address') }}">

                <div class="mb-3">
                    <label class="form-label">Full Name<span style="color: red;">*</span></label>
                    <input type="text" name="full_name" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Phone Number<span style="color: red;">*</span></label>
                    <input type="text" name="phone" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Address<span style="color: red;">*</span></label>
                    <input type="text" name="address" class="form-control" required>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Landmark<span style="color: red;">*</span></label>
                        <input type="text" name="landmark" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">City<span style="color: red;">*</span></label>
                        <input type="text" name="city" class="form-control" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">District<span style="color: red;">*</span></label>
                        <input type="text" name="district" class="form-control" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">State<span style="color: red;">*</span></label>
                        <input type="text" name="state" class="form-control" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Country</label>
                        <input type="text" name="country" class="form-control" value="India" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Pincode<span style="color: red;">*</span></label>
                        <input type="text" name="pincode" class="form-control" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-success w-100">
                    Save New Address & Continue
                </button>

            </form>

        </div>

    </div>
</div>

{% endblock %}
