{% extends "user/base_user.html" %}

{% block title %}Shipping Address{% endblock %}

{% block css %}
<style>
    .card-box {
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .address-card {
        border: 1px solid #dee2e6;
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 10px;
        background: #fff;
        transition: 0.3s;
    }

    .address-card:hover {
        border-color: #0d6efd;
        background: #f8fbff;
    }
</style>
{% endblock %}

{% block content %}

<div class="main-content">
<div class="container mt-4">

    <div class="card card-box p-4">

        <h3 class="mb-4 text-center">Select Shipping Address</h3>

        {% if addresses %}
        <h5 class="mb-3">Saved Addresses</h5>

        <form method="POST">

            {% for address in addresses %}
            <div class="address-card">
                <div class="form-check">
                    <input class="form-check-input"
                           type="checkbox"
                           name="selected_address_id"
                           value="{{ address.address_id }}"
                           id="addr{{ address.address_id }}">

                    <label class="form-check-label w-100" for="addr{{ address.address_id }}">
                        <strong>{{ address.full_name }}</strong> | {{ address.phone }} <br>
                        {{ address.address_line1 }},
                        {% if address.address_line2 %}{{ address.address_line2 }}, {% endif %}
                        {{ address.city }}, {{ address.state }} - {{ address.pincode }}, {{ address.country }}
                    </label>
                </div>
            </div>
            {% endfor %}

            <button type="submit" class="btn btn-primary mb-4 w-100">
                Use Selected Address
            </button>

            <hr>

        {% endif %}

            <h5 class="mb-3">Add New Address</h5>

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="full_name" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input type="text" name="phone" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Address Line 1</label>
                <input type="text" name="address_line1" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Address Line 2</label>
                <input type="text" name="address_line2" class="form-control">
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">City</label>
                    <input type="text" name="city" class="form-control">
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">State</label>
                    <input type="text" name="state" class="form-control">
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Pincode</label>
                    <input type="text" name="pincode" class="form-control">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Country</label>
                <input type="text" name="country" class="form-control" value="India">
            </div>

            <button type="submit" class="btn btn-success w-100">
                Save New Address & Continue
            </button>

        </form>

    </div>

</div>
</div>

{% endblock %}
