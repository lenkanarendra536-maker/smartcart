<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg,#eef2f7,#dbeafe);
            margin: 0;
        }

        /* Navbar */
        .navbar {
            background: rgba(15, 23, 42, 0.94);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 24px rgba(2, 6, 23, 0.22);
            padding: 14px 0;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff !important;
            font-weight: 700;
        }

        .brand-logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg,#2563eb,#1e40af);
            border-radius: 10px;
            display:flex;
            align-items:center;
            justify-content:center;
            color:white;
        }

        .nav-link {
            color: rgba(255,255,255,0.85) !important;
            margin-left: 10px;
            border-radius: 8px;
            padding: 8px 12px !important;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.1);
        }

        /* Flash smooth fade */
        .alert {
            transition: opacity 0.5s ease-out;
        }

        /* Form Card */
        .otp-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        /* Centering */
        .center-box {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Footer */
        footer {
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 10px;
        }

        @media(max-width:991px){
            .nav-link { margin-left: 0; margin-top: 6px; }
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">

        <a class="navbar-brand" href="/">
            <span class="brand-logo"><i class="bi bi-cart-fill"></i></span>
            SmartCart
        </a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse mt-3 mt-lg-0" id="nav">
            <ul class="navbar-nav ms-auto text-center">
                <li><a class="nav-link" href="/"><i class="bi bi-house"></i> Home</a></li>
                <li><a class="nav-link" href="/about"><i class="bi bi-info-circle"></i> About</a></li>
                <li><a class="nav-link" href="/contact"><i class="bi bi-envelope"></i> Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Main -->
<div class="container center-box">

    <div class="col-12 col-md-6 col-lg-4">

        <div class="otp-card">

            <h4 class="text-center mb-3">Verify OTP</h4>

            <!-- ✅ Fixed Flash -->
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
              {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
              {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST" action="/user-verify-otp">

                <div class="mb-3">
                    <label class="form-label">Enter OTP</label>
                    <input type="text" name="otp" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Create Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-check-circle"></i> Verify & Register
                </button>

            </form>

        </div>

    </div>

</div>

<!-- Footer -->
<footer>
    © 2026 SmartCart • OTP Verification
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- ✅ Auto Close Flash -->
<script>
    setTimeout(function () {
        let alerts = document.querySelectorAll('.alert');
        alerts.forEach(function(alert) {
            let bsAlert = new bootstrap.Alert(alert);
            bsAlert.close();
        });
    }, 3000);
</script>

</body>
</html>
