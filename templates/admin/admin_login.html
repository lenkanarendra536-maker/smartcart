{% extends "admin/base_admin.html" %}

{% block title %}Admin Login{% endblock %}

{% block css %}
<style>
    :root {
        --primary: #0f172a;
        --accent: #040b1c;
        --accent-hover: #1d4ed8;
        --text-muted: #64748b;
    }

    /* ❌ removed body, navbar, footer */

    .login-wrapper {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 30px 15px;
    }

    .login-card {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        padding: 40px 30px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
    }

    .login-title {
        font-weight: 800;
        text-align: center;
        margin-bottom: 10px;
    }

    .login-subtitle {
        text-align: center;
        color: var(--text-muted);
        margin-bottom: 25px;
    }

    .form-control {
        border-radius: 12px;
        padding: 12px;
        border: 1px solid #d1d5db;
    }

    .form-control:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 0.2rem rgba(37, 99, 235, 0.15);
    }

    .btn-primary {
        background: linear-gradient(135deg, var(--accent), var(--accent-hover));
        border: none;
        border-radius: 12px;
        padding: 12px;
        font-weight: 600;
    }

    .signup-link {
        text-align: center;
        margin-top: 15px;
        font-size: 0.9rem;
    }

    .signup-link a {
        color: var(--accent);
        font-weight: 600;
        text-decoration: none;
    }

    /* Alerts */
    .alert {
        border: none;
        border-radius: 16px;
        padding: 14px 18px;
        font-weight: 500;
    }

    .alert-success {
        background: var(--success-bg);
        color: var(--success-text);
    }
</style>
{% endblock %}

{% block content %}

<div class="container login-wrapper">
    <div class="login-card">

        <h3 class="login-title">Admin Login</h3>
        <p class="login-subtitle">Secure access to your dashboard</p>

        <!-- ❌ Flash removed (base handles it) -->

        <form method="POST" action="/admin-login">

            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter Your Email ID" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" placeholder="Enter your Password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </button>

            <div class="signup-link">
                <a href="/forgot-password">Forgot Password</a>
            </div>

            <div class="signup-link">
                Don't have an account?
                <a href="/admin-signup">Sign Up</a>
            </div>
            <div class="signup-link">
                <a href="/user-login">User Login →</a>
            </div>


        </form>

    </div>
</div>

{% endblock %}
