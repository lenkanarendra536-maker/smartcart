{% extends "admin/base_admin.html" %}

{% block title %}Product Details{% endblock %}

{% block css %}
<style>
    :root {
        --primary: #0f172a;
        --accent: #2563eb;
        --accent-hover: #1d4ed8;
        --text-muted: #64748b;
        --card-bg: rgba(255, 255, 255, 0.96);
    }

    body {
        font-family: 'Inter', sans-serif;
        background:
            radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 40%),
            radial-gradient(circle at bottom right, rgba(15, 23, 42, 0.10), transparent 40%),
            #f8fafc;
        margin: 0;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }

    /* ❌ Navbar CSS kept but navbar removed */

    .wrapper {
        flex: 1;
        padding: 40px 15px;
    }

    .product-card {
        background: var(--card-bg);
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
    }

    .product-image {
        width: 100%;
        max-width: 320px;
        height: 320px;
        object-fit: cover;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    .product-title {
        font-weight: 800;
        font-size: 1.8rem;
    }

    .product-meta {
        color: var(--text-muted);
        margin-bottom: 10px;
    }

    .price {
        font-size: 1.5rem;
        font-weight: 700;
        color: #059669;
    }

    .btn-primary {
        background: linear-gradient(135deg, var(--accent), var(--accent-hover));
        border: none;
        border-radius: 12px;
        padding: 12px 20px;
        font-weight: 600;
    }

    .btn-outline-dark {
        border-radius: 12px;
    }

    @media(max-width:768px) {
        .product-image {
            height: 240px;
        }
    }
</style>
{% endblock %}

{% block content %}

<div class="wrapper">
    <div class="container">
        <div class="row g-4 align-items-center">

            <!-- Image -->
            <div class="col-12 col-md-5 text-center">
                <img src="/static/uploads/product_images/{{ product.image }}" class="product-image">
            </div>

            <!-- Details -->
            <div class="col-12 col-md-7">
                <div class="product-card">

                    <h2 class="product-title">{{ product.name }}</h2>
                    <p class="product-meta">Category: <strong>{{ product.category }}</strong></p>

                    <p class="mb-3">{{ product.description }}</p>

                    <div class="price mb-4">₹{{ product.price }}</div>

                    <div class="d-flex flex-column flex-md-row gap-3">
                        <a href="/admin/item-list" class="btn btn-outline-dark">
                            <i class="bi bi-arrow-left"></i> Back to List
                        </a>

                        <a href="/admin/update-item/{{ product.product_id }}" class="btn btn-primary">
                            <i class="bi bi-pencil-square"></i> Edit Product
                        </a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

{% endblock %}
