<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0f172a;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --text-muted: #64748b;
            --card-bg: rgba(255, 255, 255, 0.96);
        }

        body {
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 40%),
                radial-gradient(circle at bottom right, rgba(15, 23, 42, 0.10), transparent 40%),
                #f8fafc;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        .navbar-brand {
            font-weight: 800;
            color: #fff !important;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #2563eb, #1e40af);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.85) !important;
            font-weight: 500;
            margin-left: 10px;
            border-radius: 8px;
            padding: 8px 12px !important;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff !important;
        }

        /* Layout */
        .wrapper {
            flex: 1;
            padding: 40px 15px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
        }

        .product-image {
            width: 100%;
            max-width: 320px;
            height: 320px;
            object-fit: cover;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .product-title {
            font-weight: 800;
            font-size: 1.8rem;
        }

        .product-meta {
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .price {
            font-size: 1.5rem;
            font-weight: 700;
            color: #059669;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            font-weight: 600;
        }

        .btn-outline-dark {
            border-radius: 12px;
        }

        /* Footer */
        .footer {
            background: #0f172a;
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
            padding: 12px;
            font-size: 0.9rem;
        }

        @media(max-width:768px) {
            .product-image {
                height: 240px;
            }
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/admin-dashboard">
                <span class="brand-logo"><i class="bi bi-cart3"></i></span>
                <span style="font-family: sans-serif;">Smart Cart</span>
            </a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse mt-3 mt-lg-0" id="nav">
                <ul class="navbar-nav ms-auto text-center">
                    <li class="nav-item"><a class="nav-link" href="/admin-dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin/add-item">Add Item</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin/item-list">View Items</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin/profile">Profile</a></li>
                    <li class="nav-item"><a class="nav-link text-danger" href="/admin-logout">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main -->
    <div class="wrapper">
        <div class="container">
            <div class="row g-4 align-items-center">

                <!-- Image -->
                <div class="col-12 col-md-5 text-center">
                    <img src="/static/uploads/product_images/{{ product.image }}" class="product-image">
                </div>

                <!-- Details -->
                <div class="col-12 col-md-7">
                    <div class="product-card">

                        <h2 class="product-title">{{ product.name }}</h2>
                        <p class="product-meta">Category: <strong>{{ product.category }}</strong></p>

                        <p class="mb-3">{{ product.description }}</p>

                        <div class="price mb-4">₹{{ product.price }}</div>

                        <div class="d-flex flex-column flex-md-row gap-3">
                            <a href="/admin/item-list" class="btn btn-outline-dark">
                                <i class="bi bi-arrow-left"></i> Back to List
                            </a>

                            <a href="/admin/update-item/{{ product.product_id }}" class="btn btn-primary">
                                <i class="bi bi-pencil-square"></i> Edit Product
                            </a>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        © 2026 Admin Panel • Product Detail View
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
