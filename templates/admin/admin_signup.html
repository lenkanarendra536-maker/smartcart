{% extends "admin/base_admin.html" %}

{% block title %}Admin Signup{% endblock %}

{% block css %}
<style>
    :root {
        --accent: #040b1c;
        --accent-hover: #1d4ed8;
        --text-dark: #0f172a;
        --text-muted: #64748b;
        --card-bg: rgba(255, 255, 255, 0.96);
        --border-color: #e2e8f0;
    }

    /* ❌ removed body, navbar, footer */

    .section-space {
        padding: 30px 0;
    }

    .content-card {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 24px;
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.10);
        overflow: hidden;
    }

    .content-card-header {
        padding: 28px;
        border-bottom: 1px solid var(--border-color);
    }

    .content-card-header h3 {
        margin: 0;
        font-weight: 700;
        color: var(--accent);
    }

    .content-card-body {
        padding: 28px;
    }

    .form-label {
        font-weight: 600;
        color: #1e293b;
    }

    .form-control {
        border-radius: 14px;
        min-height: 52px;
        padding: 12px 16px;
        border: 1px solid #dbe2ea;
    }

    .btn-primary {
        background: linear-gradient(135deg, var(--accent), var(--accent-hover));
        border: none;
        border-radius: 14px;
        padding: 12px;
        font-weight: 600;
    }

    /* Alerts */
    .alert {
        border: none;
        border-radius: 16px;
        padding: 14px 18px;
        font-weight: 500;
    }

    .alert-success {
        background: var(--success-bg);
        color: var(--success-text);
    }

    .auth-text {
        color: var(--text-muted);
        text-align: center;
        margin-top: 15px;
    }

    .auth-text a {
        color: var(--accent);
        font-weight: 700;
        text-decoration: none;
    }
</style>
{% endblock %}

{% block content %}

<section class="section-space">
    <div class="container">
        <div class="row justify-content-center">

            <div class="col-12 col-md-8 col-lg-6">
                <div class="content-card">

                    <div class="content-card-header">
                        <h3>Create Admin Account</h3>
                    </div>

                    <div class="content-card-body">

                        <!-- ❌ Flash removed (base handles it) -->

                        <form method="POST" action="/admin-signup">

                            <div class="mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" placeholder="Enter Your Fullname" name="name" class="form-control" required>
                            </div>


                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" placeholder="Enter Your Email ID" name="email" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <button class="btn btn-primary w-100">
                                    Send OTP
                                </button>
                            </div>

                        </form>

                        <div class="auth-text">
                            Already have an account?
                            <a href="/admin-login">Login</a>
                        </div>

                    </div>

                </div>
            </div>

        </div>
    </div>
</section>

{% endblock %}
