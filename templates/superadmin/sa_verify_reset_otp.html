{% extends "superadmin/base_superadmin.html" %}

{% block title %}Verify OTP{% endblock %}

{% block css %}
<style>
    :root {
        --primary: #0f172a;
        --accent: #040b1c;
        --accent-hover: #1d4ed8;
        --text-muted: #64748b;
    }

    .center-box {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .card {
        border-radius: 20px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
    }
    h3{
        color: var(--accent);
    }
        .btn-primary {
        background: linear-gradient(135deg, var(--accent), var(--accent-hover));
        border: none;
        border-radius: 12px;
        padding: 12px;
        font-weight: 600;
    }
</style>
{% endblock %}

{% block content %}

<div class="container center-box">
    <div class="col-12 col-md-6 col-lg-4">
        <div class="card p-4">

            <h3 class="text-center mb-3">Verify OTP</h3>

            <!-- ❌ Flash removed (base handles it) -->

            <form method="POST">
                <input type="text" name="otp" class="form-control mb-3" placeholder="Enter OTP" required>
                <button class="btn btn-success w-100">Verify OTP</button>
            </form>

        </div>
    </div>
</div>

{% endblock %}
